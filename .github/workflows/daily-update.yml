name: Daily prompt crawl

on:
  schedule:
    - cron: "0 10,22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install crawler deps
        run: python -m pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run X scraper crawler
        env:
          X_COOKIES_JSON: ${{ secrets.X_COOKIES_JSON }}
          X_COOKIES_B64: ${{ secrets.X_COOKIES_B64 }}
        run: PYTHONPATH=. python -m crawler

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Sync prompts into web/public
        run: cd web && npm ci && npm run sync-data

      - name: Commit data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/prompts.json data/trim_rules.json data/screen_rules.json web/public/prompts.json web/public/media/
          git diff --staged --quiet || git commit -m "chore: refresh prompts dataset [skip ci]"
          git push
