name: Daily prompt crawl

on:
  schedule:
    # UTC — GitHub Actions has no timezone. 11:00 & 23:00 UTC = 03:00 & 15:00 US Pacific Standard Time (PST, UTC−8).
    # During daylight time (PDT, UTC−7), the same jobs run at 04:00 & 16:00 local Pacific.
    - cron: "0 11,23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install crawler deps
        run: python -m pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run X scraper crawler
        env:
          X_COOKIES_JSON: ${{ secrets.X_COOKIES_JSON }}
          X_COOKIES_B64: ${{ secrets.X_COOKIES_B64 }}
        run: PYTHONPATH=. python -m crawler

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Sync prompts into web/public
        run: cd web && npm ci && npm run sync-data

      - name: Commit data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/prompts.json data/trim_rules.json data/screen_rules.json web/public/prompts.json web/public/media/
          git diff --staged --quiet || git commit -m "chore: refresh prompts dataset [skip ci]"
          git push
