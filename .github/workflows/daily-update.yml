name: Daily prompt update and site deploy

on:
  schedule:
    - cron: "35 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install crawler deps
        run: python -m pip install -r requirements.txt

      - name: Run crawler
        env:
          BLUESKY_IDENTIFIER: ${{ secrets.BLUESKY_IDENTIFIER }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          BLUESKY_PDS_HOST: ${{ secrets.BLUESKY_PDS_HOST }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: PYTHONPATH=. python -m crawler

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install web deps
        working-directory: web
        run: npm install

      - name: Build site
        working-directory: web
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run build

      - name: Commit data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/prompts.json
          git diff --staged --quiet || git commit -m "chore: refresh prompts dataset [skip ci]"
          git push

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - id: deploy
        uses: actions/deploy-pages@v4
